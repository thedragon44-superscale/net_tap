<!DOCTYPE html>
<html>
<head>
    <title>The Dragon HMS - Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 flex items-center justify-center min-h-screen font-sans p-6">
    <div class="bg-zinc-800 p-8 rounded-xl shadow-2xl w-full max-w-md border-t-4 border-orange-500 shadow-[0_0_40px_rgba(249,115,22,0.15)]">
        <div class="flex justify-center mb-6">
            <img src="/static/dragon_logo.png" alt="Dragon Logo" class="h-20 w-20 rounded-full border border-orange-500 shadow-lg object-cover">
        </div>
        <h2 class="text-2xl font-extrabold text-center text-white mb-2 tracking-tight">IDENTITY VERIFICATION</h2>
        <p class="text-zinc-400 text-center text-sm mb-6">Enter the 6-digit transmission sent to your email.</p>
        
        <form action="/verify" method="post" class="space-y-4">
            <div>
                <input type="text" name="otp_code" required placeholder="XXXXXX" maxlength="6" class="w-full px-4 py-3 rounded-lg bg-zinc-900 border border-zinc-700 text-orange-500 text-center text-2xl font-mono tracking-[0.5em] focus:outline-none focus:border-orange-500 transition">
            </div>
            <button type="submit" class="w-full bg-orange-500 hover:bg-orange-400 text-white shadow-lg shadow-orange-500/30 font-bold py-3 rounded-lg transition duration-200 mt-2 cursor-pointer">Authenticate to Matrix</button>
        </form>
    </div>
</body>
</html>
