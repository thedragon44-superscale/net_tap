<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dragon HMS - Enlist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-login {
            background-image: url('/static/business_marcus.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .glass-panel {
            background: rgba(17, 24, 39, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .metallic-border { border: 2px solid #94a3b8; border-radius: 1rem; }
    </style>
</head>
<body class="bg-login text-white font-sans antialiased min-h-screen flex items-center justify-center relative">
    
    <div class="absolute inset-0 bg-black/60 pointer-events-none z-0"></div>
    
    <div class="glass-panel metallic-border p-10 w-full max-w-md relative z-10 flex flex-col items-center">
        <img src="/static/dragon_logo.png" alt="Dragon Logo" class="w-20 h-20 mb-4 rounded-full border-2 border-blue-400 shadow-[0_0_15px_rgba(59,130,246,0.5)] object-cover">
        <h2 class="text-3xl font-bold text-white mb-1 tracking-wider">REQUEST <span class="text-blue-500">CLEARANCE</span></h2>
        <p class="text-blue-200 mb-8 text-sm uppercase tracking-widest font-bold">System Registration</p>
        
        <form action="/register" method="post" class="w-full space-y-5">
            <div>
                <input type="email" name="email" required placeholder="Assign Email" class="w-full px-4 py-3 rounded-lg bg-black/50 border border-white/20 text-white placeholder-zinc-400 focus:outline-none focus:border-blue-400 transition backdrop-blur-md">
            </div>
            <div>
                <input type="password" name="password" required placeholder="Assign Passcode" class="w-full px-4 py-3 rounded-lg bg-black/50 border border-white/20 text-white placeholder-zinc-400 focus:outline-none focus:border-blue-400 transition backdrop-blur-md">
            </div>
            <button type="submit" class="w-full bg-blue-600/80 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition shadow-[0_0_15px_rgba(37,99,235,0.4)] border border-blue-400/50 backdrop-blur-md cursor-pointer">
                Enlist Identity
            </button>
        </form>
        
        <p class="mt-6 text-zinc-400 text-sm">Already an operative? <a href="/" class="text-blue-400 hover:text-blue-300 transition font-bold">Return to Gateway</a></p>
    </div>
</body>
</html>
